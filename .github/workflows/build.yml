name: Build Portable Binaries

on:
  push:
    tags:
      - 'v*'           # Trigger on version tags like v1.0.0
  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  build-windows:
    name: Build for Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build with PyInstaller
        run: uv run pyinstaller oh-my-port.spec --distpath dist/windows --workpath build/windows --noconfirm

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: oh-my-port-windows
          path: dist/windows/oh-my-port.exe

  build-linux:
    name: Build for Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-xinerama0 \
            libxcb-cursor0 \
            libgl1-mesa-glx \
            libegl1

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build with PyInstaller
        run: uv run pyinstaller oh-my-port.spec --distpath dist/linux --workpath build/linux --noconfirm

      - name: Make binary executable
        run: chmod +x dist/linux/oh-my-port

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: oh-my-port-linux
          path: dist/linux/oh-my-port

  release:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: oh-my-port-windows
          path: release/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: oh-my-port-linux
          path: release/

      - name: Rename binaries
        run: |
          mv release/oh-my-port.exe release/oh-my-port-windows.exe
          mv release/oh-my-port release/oh-my-port-linux
          chmod +x release/oh-my-port-linux

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/oh-my-port-windows.exe
            release/oh-my-port-linux
          generate_release_notes: true
